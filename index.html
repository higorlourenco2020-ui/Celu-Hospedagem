<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospedagem CELU</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- jsPDF: generates PDF purely in JS — no DOM cloning needed -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- EmailJS: sends emails directly from the browser -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #c62828;
      --red-dark:   #8e0000;
      --red-light:  #ffebee;
      --ink:        #1a1a1a;
      --muted:      #6b6b6b;
      --border:     #e0e0e0;
      --surface:    #ffffff;
      --bg:         #f4f1ee;
      --radius:     10px;
      --shadow:     0 4px 24px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
    }

    .card-header {
      background: var(--red);
      padding: 28px 32px 24px;
      text-align: center;
    }

    .card-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: #fff;
      letter-spacing: 0.01em;
    }

    .card-header p {
      color: rgba(255,255,255,0.75);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .card-body {
      padding: 28px 32px 32px;
    }

    /* ── Form sections ── */
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      margin-top: 24px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .section-title:first-child { margin-top: 0; }

    /* ── Fields ── */
    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      background: var(--surface);
      transition: border-color 0.15s;
      appearance: none;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--red);
    }

    .field-hint {
      font-size: 0.75rem;
      color: #e53935;
      margin-top: 4px;
      display: none;
    }
    .field-hint.visible { display: block; }
    input.invalid { border-color: #e53935; }

    textarea { resize: vertical; min-height: 72px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Checkbox ── */
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .checkbox-field:hover { border-color: var(--red); background: var(--red-light); }

    .checkbox-field input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--red);
      cursor: pointer;
      flex-shrink: 0;
    }

    .checkbox-field span {
      font-size: 0.9rem;
      color: var(--ink);
      user-select: none;
    }

    /* ── Buttons ── */
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 24px; }

    .btn {
      padding: 12px;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary   { background: var(--red);       color: #fff; }
    .btn-primary:hover { background: var(--red-dark); }

    .btn-secondary { background: var(--red-light); color: var(--red); }
    .btn-secondary:hover { background: #ffcdd2; }

    /* ── Cost Summary ── */
    .cost-box {
      background: var(--red-light);
      border: 1.5px solid #ffcdd2;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-top: 4px;
    }
    .cost-box.hidden { display: none; }
    .cost-line {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      color: var(--muted);
      padding: 3px 0;
    }
    .cost-line.total {
      border-top: 1px solid #ffcdd2;
      margin-top: 8px;
      padding-top: 10px;
      font-weight: 600;
      font-size: 1rem;
      color: var(--red);
    }
    .cost-line.total span:last-child {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
    }

    /* ── Person cards ── */
    .person-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 6px;
      margin-bottom: 12px;
      position: relative;
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .person-card:focus-within {
      border-color: var(--red);
    }
    .person-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .person-card-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--red);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .btn-remove-person {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-remove-person:hover { color: var(--red); background: var(--red-light); }
    .btn-add-person {
      width: 100%;
      padding: 10px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      margin-top: 4px;
    }
    .btn-add-person:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-light);
    }

    /* ── Discount ── */
    .discount-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: end;
    }

    .cost-line.discount {
      color: #388e3c;
    }
    .cost-line.discount span:last-child {
      font-weight: 600;
    }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      width: 100%;
      max-width: 400px;
      transform: translateY(16px);
      transition: transform 0.2s;
    }
    .modal-backdrop.open .modal {
      transform: translateY(0);
    }
    .modal-header {
      background: var(--red);
      padding: 18px 24px;
      border-radius: 16px 16px 0 0;
    }
    .modal-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: #fff;
    }
    .modal-body {
      padding: 20px 24px;
    }
    .modal-body .review-line {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .modal-body .review-line:last-child { border-bottom: none; }
    .modal-body .review-line span:first-child { color: var(--muted); flex-shrink: 0; }
    .modal-body .review-line span:last-child  { color: var(--ink); text-align: right; font-weight: 500; }
    .modal-body .review-total {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      font-weight: 700;
      color: var(--red);
      margin-top: 12px;
      padding-top: 10px;
      border-top: 2px solid var(--red-light);
    }
    .modal-body .review-total span:last-child {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
    }
    .modal-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 24px 20px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 1000;
      white-space: nowrap;
    }

    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--red); }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <img src="logo-img.png" alt="CELU" style="width:56px;height:56px;object-fit:contain;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;">
    <h1>Hospedagem CELU</h1>
    <p>Casa do Estudante Luterano Universitário</p>
  </div>

  <div class="card-body">

    <p class="section-title">Dados Pessoais</p>

    <div id="pessoas-container">
      <!-- Person cards injected by JS -->
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
      <button type="button" class="btn-add-person" id="btn-add-person" onclick="App.adicionarPessoa()" style="margin-top:0;flex:1">+ Adicionar pessoa</button>
      <span id="pessoa-count-badge" style="font-size:0.78rem;font-weight:600;color:var(--red);background:var(--red-light);border:1.5px solid #ffcdd2;border-radius:20px;padding:3px 10px;white-space:nowrap;display:none;">1 pessoa</span>
    </div>

    <p class="section-title">Tipo de Reserva</p>

    <div class="row">
      <div class="field">
        <label for="tipo-reserva">Tipo</label>
        <select id="tipo-reserva">
          <option value="Hóspede">Hóspede</option>
          <option value="Excursão">Excursão</option>
        </select>
      </div>
      <div class="field" style="display:none">
        <label for="num-pessoas">Número de pessoas</label>
        <input type="number" id="num-pessoas" placeholder="1" value="1" min="1" max="999" step="1">
      </div>
    </div>

    <p class="section-title">Estadia</p>

    <div class="row">
      <div class="field">
        <label for="checkin">Check-in <span style="color:var(--red)">*</span></label>
        <input type="date" id="checkin">
      </div>
      <div class="field">
        <label for="checkout">Check-out <span style="color:var(--red)">*</span></label>
        <input type="date" id="checkout">
      </div>
    </div>

    <p class="section-title">Serviços</p>

    <div class="field">
      <label for="modalidade">Modalidade</label>
      <select id="modalidade">
        <option value="Misto - R$50">Misto — R$50</option>
        <option value="Privativo - R$60">Privativo — R$60</option>
      </select>
    </div>

    <div class="field">
      <label class="checkbox-field">
        <input type="checkbox" id="roupa">
        <span>Roupa de cama <em>(+R$5)</em></span>
      </label>
    </div>

    <div class="field">
      <label for="pagamento">Forma de pagamento</label>
      <select id="pagamento">
        <option value="Pix">Pix</option>
        <option value="Dinheiro">Dinheiro</option>
        <option value="Cartão">Cartão</option>
      </select>
    </div>

    <p class="section-title">Resumo do Custo</p>

    <div id="cost-box" class="cost-box hidden">
      <div class="cost-line">
        <span id="cost-label-nights">—</span>
        <span id="cost-val-nights">—</span>
      </div>
      <div class="cost-line" id="cost-row-roupa" style="display:none">
        <span>Roupa de cama</span>
        <span>R$ 5,00</span>
      </div>
      <div class="cost-line discount" id="cost-row-desconto" style="display:none">
        <span id="cost-label-desconto">Desconto</span>
        <span id="cost-val-desconto">—</span>
      </div>
      <div class="cost-line total">
        <span>Total estimado</span>
        <span id="cost-val-total">—</span>
      </div>
    </div>

    <p class="section-title">Desconto</p>

    <div class="discount-row">
      <div class="field">
        <label for="desconto-tipo">Tipo de desconto</label>
        <select id="desconto-tipo">
          <option value="none">Sem desconto</option>
          <option value="percent">Percentual (%)</option>
          <option value="fixed">Valor fixo (R$)</option>
        </select>
      </div>
      <div class="field" id="desconto-valor-field" style="display:none">
        <label for="desconto-valor" id="desconto-valor-label">Valor</label>
        <input type="text" id="desconto-valor" placeholder="0">
      </div>
    </div>

    <p class="section-title">Observações</p>

    <div class="field">
      <label for="responsavel">Responsável pelo check-in <span style="color:var(--red)">*</span></label>
      <input type="text" id="responsavel" placeholder="Nome do colaborador">
      <span class="field-hint" id="responsavel-hint">Campo obrigatório</span>
    </div>

    <div class="field">
      <textarea id="obs" placeholder="Anotações adicionais sobre o hóspede ou a estadia..."></textarea>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btn-salvar" onclick="App.salvar()">Registrar</button>
      <button class="btn btn-secondary" onclick="App.gerarPDF()">Gerar Ficha</button>
    </div>

  </div>
</div>

<div id="modal-backdrop" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>Confirmar Registro</h2>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- filled by JS -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="App.cancelarModal()">Voltar</button>
      <button class="btn btn-primary" id="btn-confirmar" onclick="App.confirmarSalvar()">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════════════
     APPLICATION SCRIPT
     ─────────────────────────────────────────────────────────────────
     Layers:
       FormModel        — reads & validates form fields into a plain object
       FirebaseService  — persists the plain object to Firestore
       EmailService     — sends confirmation emails via EmailJS
       PdfService       — builds the PDF from the plain object via jsPDF
       App              — orchestrates the layers
     ═══════════════════════════════════════════════════════════════════ -->
<script type="module">

  // ── Firebase ────────────────────────────────────────────────────────
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, addDoc, collection }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:     "AIzaSyBpvwyRLFUFfjc6u7ZsoiSA3vRNrz1syXg",
    authDomain: "bloqueto-caacd.firebaseapp.com",
    projectId:  "bloqueto-caacd"
  };

  const db = getFirestore(initializeApp(firebaseConfig));


  // ── Logo (base64 embedded) ─────────────────────────────────────────


  // ── EmailJS config ───────────────────────────────────────────────────
  // Replace these three values with your own from emailjs.com:
  //   1. Create a free account → Add an Email Service → note the Service ID
  //   2. Create an Email Template → note the Template ID
  //      Template variables to use: {{guest_name}}, {{guest_email}},
  //      {{checkin}}, {{checkout}}, {{nights}}, {{modalidade}},
  //      {{roupa}}, {{pagamento}}, {{total}}, {{obs}}
  //   3. Account → API Keys → note the Public Key
  const EMAILJS_PUBLIC_KEY  = "efxA6x4WmNmkbwKAx";
  const EMAILJS_SERVICE_ID  = "service_c8sjtbp";
  const EMAILJS_TEMPLATE_ID = "template_3ukvqre";
  const HOSTEL_EMAIL        = "hospedagem@celu.com.br";

  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });



  // ── Toast ────────────────────────────────────────────────────────────
  const Toast = (() => {
    const el = document.getElementById("toast");
    let timer;
    return {
      show(msg, isError = false) {
        el.textContent = msg;
        el.className   = "show" + (isError ? " error" : "");
        clearTimeout(timer);
        timer = setTimeout(() => { el.className = ""; }, 6000);
      }
    };
  })();


  // ── InputMask ────────────────────────────────────────────────────────
  const InputMask = {
    _apply(el, formatter) {
      if (!el) return;
      el.addEventListener("input", () => {
        const before = el.value.length - el.selectionEnd;
        el.value = formatter(el.value);
        const pos = Math.max(0, el.value.length - before);
        el.setSelectionRange(pos, pos);
      });
    },
    cpfCnpj(raw) {
      const d = raw.replace(/\D/g, "").slice(0, 14);
      if (d.length <= 3) return d;
      if (d.length <= 6) return `${d.slice(0,3)}.${d.slice(3)}`;
      if (d.length <= 9) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;
      if (d.length <= 11) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
      // CNPJ: 00.000.000/0000-00
      if (d.length <= 12) return `${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8)}`;
      if (d.length <= 13) return `${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8,12)}-${d.slice(12)}`;
      return `${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8,12)}-${d.slice(12,14)}`;
    },
    phone(raw) {
      const d = raw.replace(/\D/g, "").slice(0, 11);
      if (d.length <= 2)  return d.length ? `(${d}` : "";
      if (d.length <= 6)  return `(${d.slice(0,2)}) ${d.slice(2)}`;
      const split = d.length === 11 ? 7 : 6;
      return `(${d.slice(0,2)}) ${d.slice(2,split)}-${d.slice(split)}`;
    },
    applyToCard(card) {
      this._apply(card.querySelector(".input-cpf"),     v => this.cpfCnpj(v));
      this._apply(card.querySelector(".input-contato"), v => this.phone(v));
    }
  };

  // ── Document Validator (CPF + CNPJ) ─────────────────────────────────
  const DocValidator = {
    validateCPF(raw) {
      const d = raw.replace(/\D/g, "");
      if (d.length !== 11 || /^(\d)\1{10}$/.test(d)) return false;
      const calc = (len) => {
        let sum = 0;
        for (let i = 0; i < len; i++) sum += parseInt(d[i]) * (len + 1 - i);
        const r = (sum * 10) % 11;
        return r === 10 || r === 11 ? 0 : r;
      };
      return calc(9) === parseInt(d[9]) && calc(10) === parseInt(d[10]);
    },
    validateCNPJ(raw) {
      const d = raw.replace(/\D/g, "");
      if (d.length !== 14 || /^(\d)\1{13}$/.test(d)) return false;
      const calc = (weights) => {
        let sum = 0;
        for (let i = 0; i < weights.length; i++) sum += parseInt(d[i]) * weights[i];
        const r = sum % 11;
        return r < 2 ? 0 : 11 - r;
      };
      const w1 = [5,4,3,2,9,8,7,6,5,4,3,2];
      const w2 = [6,5,4,3,2,9,8,7,6,5,4,3,2];
      return calc(w1) === parseInt(d[12]) && calc(w2) === parseInt(d[13]);
    },
    validate(raw) {
      const d = raw.replace(/\D/g, "");
      if (d.length === 11) return this.validateCPF(raw);
      if (d.length === 14) return this.validateCNPJ(raw);
      return false;
    },
    // Returns "CPF", "CNPJ", or null based on digit count
    type(raw) {
      const d = raw.replace(/\D/g, "");
      if (d.length === 11) return "CPF";
      if (d.length === 14) return "CNPJ";
      return null;
    }
  };

  // ── PessoaManager ─────────────────────────────────────────────────────
  const PessoaManager = {
    container: null,

    init() {
      this.container = document.getElementById("pessoas-container");
      this.add();
    },

    add() {
      const isFirst = this.container.children.length === 0;
      const idx     = this.container.children.length; // 0-based position
      const uid     = `p${Date.now()}`; // unique prefix for label/input pairs
      const card    = document.createElement("div");
      card.className = "person-card";
      card.innerHTML = `
        <div class="person-card-header">
          <span class="person-card-title">${isFirst ? "Hóspede principal" : `Acompanhante ${idx}`}</span>
          ${!isFirst ? `<button type="button" class="btn-remove-person" title="Remover" aria-label="Remover acompanhante" onclick="App.removerPessoa(this)">✕</button>` : ""}
        </div>
        <div class="field">
          <label for="${uid}-nome">Nome completo <span style="color:var(--red)">*</span></label>
          <input type="text" id="${uid}-nome" class="input-nome" placeholder="Nome completo">
          <span class="field-hint hint-nome">Campo obrigatório</span>
        </div>
        <div class="row">
          <div class="field">
            <label for="${uid}-cpf">CPF / CNPJ <span style="color:var(--red)">*</span></label>
            <input type="text" id="${uid}-cpf" class="input-cpf" placeholder="000.000.000-00 ou 00.000.000/0000-00">
            <span class="field-hint hint-cpf">Documento inválido</span>
          </div>
          <div class="field">
            <label for="${uid}-contato">Contato</label>
            <input type="text" id="${uid}-contato" class="input-contato" placeholder="(00) 00000-0000">
          </div>
        </div>
        <div class="field">
          <label for="${uid}-email">E-mail</label>
          <input type="text" id="${uid}-email" class="input-email" placeholder="hospede@exemplo.com">
          <span class="field-hint hint-email">E-mail inválido</span>
        </div>
      `;
      this.container.appendChild(card);
      InputMask.applyToCard(card);
      this._attachBlur(card);
    },

    _attachBlur(card) {
      const nomeEl = card.querySelector(".input-nome");
      const hNome  = card.querySelector(".hint-nome");
      nomeEl.addEventListener("blur", () => {
        const ok = nomeEl.value.trim().length > 0;
        nomeEl.classList.toggle("invalid", !ok);
        hNome.classList.toggle("visible", !ok);
      });
      nomeEl.addEventListener("input", () => {
        if (nomeEl.value.trim()) { nomeEl.classList.remove("invalid"); hNome.classList.remove("visible"); }
      });

      const cpfEl = card.querySelector(".input-cpf");
      const hCpf  = card.querySelector(".hint-cpf");
      cpfEl.addEventListener("blur", () => {
        const val = cpfEl.value.trim();
        if (!val) { cpfEl.classList.add("invalid"); hCpf.textContent = "Campo obrigatório"; hCpf.classList.add("visible"); return; }
        const ok  = DocValidator.validate(val);
        const typ = DocValidator.type(val);
        hCpf.textContent = typ ? `${typ} inválido` : "Informe um CPF (11 dígitos) ou CNPJ (14 dígitos)";
        cpfEl.classList.toggle("invalid", !ok);
        hCpf.classList.toggle("visible", !ok);
      });
      cpfEl.addEventListener("input", () => {
        if (DocValidator.validate(cpfEl.value.trim())) { cpfEl.classList.remove("invalid"); hCpf.classList.remove("visible"); }
      });

      const emailEl = card.querySelector(".input-email");
      const hEmail  = card.querySelector(".hint-email");
      emailEl.addEventListener("blur", () => {
        const val = emailEl.value.trim();
        if (!val) { emailEl.classList.remove("invalid"); hEmail.classList.remove("visible"); return; }
        const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
        emailEl.classList.toggle("invalid", !ok);
        hEmail.classList.toggle("visible", !ok);
      });
    },

    remove(btn) {
      btn.closest(".person-card").remove();
      this._renumber();
    },

    _renumber() {
      Array.from(this.container.querySelectorAll(".person-card")).forEach((c, i) => {
        c.querySelector(".person-card-title").textContent =
          i === 0 ? "Hóspede principal" : `Acompanhante ${i}`;
      });
    },

    readAll() {
      return Array.from(this.container.querySelectorAll(".person-card")).map(card => ({
        nome:    card.querySelector(".input-nome").value.trim(),
        cpf:     card.querySelector(".input-cpf").value.trim(),
        contato: card.querySelector(".input-contato").value.trim(),
        email:   card.querySelector(".input-email").value.trim(),
      }));
    },

    validate() {
      const list = this.readAll();
      for (let i = 0; i < list.length; i++) {
        const p = list[i];
        const who = i === 0 ? "do hóspede principal" : `do acompanhante ${i}`;
        if (!p.nome)                        return `Preencha o nome ${who}.`;
        if (!p.cpf)                         return `Preencha o CPF/CNPJ ${who}.`;
        if (!DocValidator.validate(p.cpf))  return `O CPF/CNPJ ${who} é inválido.`;
        if (p.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(p.email))
                                            return `O e-mail ${who} é inválido.`;
      }
      // Duplicate document check
      const docs = list.map(p => p.cpf.replace(/\D/g, ""));
      for (let i = 0; i < docs.length; i++) {
        if (!docs[i]) continue;
        for (let j = i + 1; j < docs.length; j++) {
          if (docs[i] === docs[j]) {
            const whoI = i === 0 ? "hóspede principal" : `acompanhante ${i}`;
            const whoJ = j === 0 ? "hóspede principal" : `acompanhante ${j}`;
            return `CPF/CNPJ duplicado: ${whoI} e ${whoJ} têm o mesmo documento.`;
          }
        }
      }
      return null;
    },

    resetAll() {
      const cards = Array.from(this.container.querySelectorAll(".person-card"));
      cards.forEach((c, i) => { if (i > 0) c.remove(); });
      const first = this.container.querySelector(".person-card");
      if (first) {
        first.querySelectorAll("input").forEach(el => { el.value = ""; el.classList.remove("invalid"); });
        first.querySelectorAll(".field-hint").forEach(el => el.classList.remove("visible"));
      }
    }
  };




  // ── CostModel ────────────────────────────────────────────────────────
  // Responsibility: derive cost breakdown from a plain data object.
  const PRICES = { "Misto - R$50": 50, "Privativo - R$60": 60 };

  const CostModel = {
    compute(data) {
      const nights = data.checkin && data.checkout
        ? Math.max(0, (new Date(data.checkout) - new Date(data.checkin)) / 86_400_000)
        : 0;
      const pessoas       = Math.max(1, parseInt(data.numPessoas) || 1);
      const ratePerNight  = PRICES[data.modalidade] ?? 50;
      const accommodation = nights * ratePerNight * pessoas;
      const linen         = data.roupa ? 5 * pessoas : 0;
      const subtotal      = accommodation + linen;

      // Discount logic
      let discount = 0;
      const descontoValor = parseFloat(String(data.descontoValor || "0").replace(",", ".")) || 0;
      if (data.descontoTipo === "percent") {
        discount = Math.min(subtotal, subtotal * (descontoValor / 100));
      } else if (data.descontoTipo === "fixed") {
        discount = Math.min(subtotal, descontoValor);
      }

      return { nights, pessoas, ratePerNight, accommodation, linen, subtotal, discount, total: subtotal - discount };
    }
  };


  // ── CostView ─────────────────────────────────────────────────────────
  // Responsibility: render cost breakdown in the UI reactively.
  const CostView = {
    _fmt: n => n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" }),
    update(data) {
      const { nights, pessoas, ratePerNight, accommodation, linen, discount, total } = CostModel.compute(data);
      const box = document.getElementById("cost-box");
      if (nights === 0) { box.classList.add("hidden"); return; }
      box.classList.remove("hidden");
      document.getElementById("cost-label-nights").textContent =
        pessoas > 1
          ? `${nights} diária${nights > 1 ? "s" : ""} × ${this._fmt(ratePerNight)} × ${pessoas} pessoas`
          : `${nights} diária${nights > 1 ? "s" : ""} × ${this._fmt(ratePerNight)}`;
      document.getElementById("cost-val-nights").textContent  = this._fmt(accommodation);
      document.getElementById("cost-row-roupa").style.display = linen ? "flex" : "none";

      // Discount row
      const descontoRow = document.getElementById("cost-row-desconto");
      if (discount > 0) {
        const tipo = data.descontoTipo;
        const val  = parseFloat(String(data.descontoValor || "0").replace(",", ".")) || 0;
        document.getElementById("cost-label-desconto").textContent =
          tipo === "percent" ? `Desconto (${val}%)` : "Desconto";
        document.getElementById("cost-val-desconto").textContent = `- ${this._fmt(discount)}`;
        descontoRow.style.display = "flex";
      } else {
        descontoRow.style.display = "none";
      }

      document.getElementById("cost-val-total").textContent   = this._fmt(total);
    }
  };

  ["checkin", "checkout", "modalidade", "roupa", "tipo-reserva", "num-pessoas"].forEach(id => {
    document.getElementById(id).addEventListener("change", () => {
      CostView.update(FormModel.read());
    });
  });

  // Set checkout min to checkin + 1 day whenever checkin changes
  document.getElementById("checkin").addEventListener("change", function() {
    const coEl = document.getElementById("checkout");
    if (!this.value) { coEl.removeAttribute("min"); return; }
    const next = new Date(this.value);
    next.setDate(next.getDate() + 1);
    const minVal = next.toISOString().slice(0, 10);
    coEl.setAttribute("min", minVal);
    // If existing checkout is now invalid, clear it
    if (coEl.value && coEl.value <= this.value) {
      coEl.value = "";
      CostView.update(FormModel.read());
    }
  });

  document.getElementById("num-pessoas").addEventListener("input", () => {
    CostView.update(FormModel.read());
  });

  // Discount type toggle
  document.getElementById("desconto-tipo").addEventListener("change", function() {
    const field = document.getElementById("desconto-valor-field");
    const label = document.getElementById("desconto-valor-label");
    const input = document.getElementById("desconto-valor");
    if (this.value === "none") {
      field.style.display = "none";
      input.value = "";
    } else {
      field.style.display = "";
      label.textContent = this.value === "percent" ? "Percentual (%)" : "Valor (R$)";
      input.placeholder = this.value === "percent" ? "Ex: 10" : "Ex: 25,00";
    }
    CostView.update(FormModel.read());
  });

  document.getElementById("desconto-valor").addEventListener("input", () => {
    CostView.update(FormModel.read());
  });

  document.getElementById("desconto-valor").addEventListener("blur", function() {
    const raw = this.value.replace(",", ".");
    const n   = parseFloat(raw);
    if (this.value.trim() !== "" && (isNaN(n) || n < 0)) {
      this.classList.add("invalid");
      // Reuse or create hint span
      let hint = this.nextElementSibling;
      if (!hint || !hint.classList.contains("field-hint")) {
        hint = document.createElement("span");
        hint.className = "field-hint";
        this.parentNode.insertBefore(hint, this.nextSibling);
      }
      hint.textContent = "Informe um valor numérico válido (ex: 10 ou 25,00)";
      hint.classList.add("visible");
    } else {
      this.classList.remove("invalid");
      const hint = this.nextElementSibling;
      if (hint && hint.classList.contains("field-hint")) hint.classList.remove("visible");
    }
  });


  // ── FormModel ────────────────────────────────────────────────────────
  const FormModel = {
    read() {
      const g = id => document.getElementById(id);
      const pessoas = PessoaManager.readAll();
      const lead    = pessoas[0] || {};
      const data = {
        // Lead person (primary guest) — kept flat for email/PDF compat
        nome:          lead.nome    || "",
        cpf:           lead.cpf     || "",
        contato:       lead.contato || "",
        email:         lead.email   || "",
        // All persons array (for Firebase + PDF)
        pessoas,
        checkin:       g("checkin").value,
        checkout:      g("checkout").value,
        modalidade:    g("modalidade").value,
        roupa:         g("roupa").checked,
        pagamento:     g("pagamento").value,
        tipoReserva:   g("tipo-reserva").value,
        numPessoas:    String(pessoas.length),
        descontoTipo:  g("desconto-tipo").value,
        descontoValor: g("desconto-valor").value.trim(),
        obs:           g("obs").value.trim(),
        responsavel:   g("responsavel").value.trim(),
      };
      const { nights, total, discount } = CostModel.compute(data);
      data.noites        = nights;
      data.desconto      = discount;
      data.totalEstimado = total;
      return data;
    },

    validate(data) {
      const pessoaErr = PessoaManager.validate();
      if (pessoaErr) return pessoaErr;
      if (!data.checkin)  return "Por favor, informe a data de check-in.";
      if (!data.checkout) return "Por favor, informe a data de check-out.";
      if (new Date(data.checkout) <= new Date(data.checkin))
        return "O check-out deve ser pelo menos um dia após o check-in.";
      if (!data.responsavel) return "Por favor, informe o responsável pelo check-in.";
      return null;
    },

    _validEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    },

    reset() {
      PessoaManager.resetAll();
      const g = id => document.getElementById(id);
      ["obs","responsavel","desconto-valor"].forEach(id => { g(id).value = ""; });
      g("num-pessoas").value = "1";
      g("tipo-reserva").selectedIndex = 0;
      ["checkin","checkout"].forEach(id => { g(id).value = ""; });
      g("modalidade").selectedIndex = 0;
      g("roupa").checked = false;
      g("pagamento").selectedIndex = 0;
      g("desconto-tipo").selectedIndex = 0;
      g("desconto-valor-field").style.display = "none";
      g("cost-box").classList.add("hidden");
      ["responsavel"].forEach(id => { g(id).classList.remove("invalid"); });
      ["responsavel-hint"].forEach(id => { g(id).classList.remove("visible"); });
    }
  };

  // ── FirebaseService ──────────────────────────────────────────────────
  // Responsibility: persist a guest data object to Firestore.
  const FIREBASE_ERRORS = {
    "permission-denied":    "Sem permissão para salvar. Verifique as regras do Firestore.",
    "unavailable":          "Serviço indisponível no momento. Tente novamente em instantes.",
    "not-found":            "Banco de dados não encontrado. Verifique a configuração do Firebase.",
    "resource-exhausted":   "Limite de requisições atingido. Aguarde alguns instantes.",
    "unauthenticated":      "Autenticação necessária para salvar os dados.",
    "network-request-failed": "Falha de conexão. Verifique sua internet e tente novamente.",
  };

  const FirebaseService = {
    async save(data) {
      await addDoc(collection(db, "hospedes"), data);
    },
    friendlyError(e) {
      const code = e?.code?.replace("firestore/", "") ?? "";
      return FIREBASE_ERRORS[code] ?? "Erro ao salvar. Tente novamente ou contate o suporte.";
    }
  };


  // ── EmailService ─────────────────────────────────────────────────────
  // Responsibility: send confirmation emails via EmailJS.
  // Sends to the guest (if an email was provided) and always to the hostel.
  const EmailService = {
    _fmt: n => n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" }),
    _fmtDate(iso) {
      if (!iso) return "—";
      const [y, m, d] = iso.split("-");
      return `${d}/${m}/${y}`;
    },

    async send(data) {
      // Only proceed if EmailJS has been configured
      if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
        console.warn("EmailJS not configured — skipping email send.");
        return;
      }

      const cost = CostModel.compute(data);
      const templateParams = {
        // Keys match the {{variables}} in the EmailJS template exactly
        name:               data.nome,
        "check-in_date":    this._fmtDate(data.checkin),
        "check-out_date":   this._fmtDate(data.checkout),
        accommodation_type: data.modalidade,
        booking_type:       data.tipoReserva || "Hóspede",
        number_of_people:   data.numPessoas || 1,
        number_of_nights:   cost.nights,
        daily_rate:         this._fmt(cost.ratePerNight),
        discount:           cost.discount > 0 ? this._fmt(cost.discount) : "—",
        total_amount:       this._fmt(cost.total),
        responsavel:        data.responsavel || "—",
        // to_email: combined string so both guest + hostel receive the email
        to_email:           data.email ? `${data.email},${HOSTEL_EMAIL}` : HOSTEL_EMAIL,
        // guest_email: just the guest's address, use in Reply To field
        guest_email:        data.email || "",
      };

      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
    }
  };


  // ── PdfService ───────────────────────────────────────────────────────
  // Responsibility: generate a downloadable PDF from a plain data object.
  // Uses jsPDF's drawing API directly — zero DOM side-effects.
  const PdfService = {
    generate(data) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "mm", format: "a4" });

      // ── Palette
      const RED   = [198, 40, 40];
      const BLACK = [26, 26, 26];
      const GRAY  = [107, 107, 107];
      const W     = 210;   // A4 width in mm
      const PAD   = 20;

      // ── Header bar
      doc.setFillColor(...RED);
      doc.rect(0, 0, W, 30, "F");
      doc.setFont("helvetica", "bold");
      doc.setFontSize(18);
      doc.setTextColor(255, 255, 255);
      doc.text("Hospedagem CELU", W / 2, 13, { align: "center" });
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.text("Ficha de Hóspede", W / 2, 21, { align: "center" });

      let y = 42;
      const PAGE_H   = 277; // leave 20mm margin at bottom
      const HEADER_H = 30;  // height of the red header bar

      // Start a new page and reset y, re-drawing the page header
      const newPage = () => {
        doc.addPage();
        doc.setFillColor(...RED);
        doc.rect(0, 0, W, HEADER_H, "F");
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.setTextColor(255, 255, 255);
        doc.text("Hospedagem CELU", W / 2, 13, { align: "center" });
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.text("Ficha de Hóspede (cont.)", W / 2, 21, { align: "center" });
        y = HEADER_H + 12;
      };

      // Guard: if adding `needed` mm would overflow, start a new page
      const guard = (needed = 10) => { if (y + needed > PAGE_H) newPage(); };

      // ── Helpers
      const section = (title) => {
        guard(16);
        doc.setFontSize(8);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(...GRAY);
        doc.text(title.toUpperCase(), PAD, y);
        doc.setDrawColor(...RED);
        doc.setLineWidth(0.4);
        doc.line(PAD, y + 2, W - PAD, y + 2);
        y += 10;
      };

      const row = (label, value) => {
        guard(10);
        doc.setFontSize(10);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(...GRAY);
        doc.text(label + ":", PAD, y);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(...BLACK);
        doc.text(value || "—", PAD + 38, y);
        y += 8;
      };

      // ── Sections
      const pessoas = Array.isArray(data.pessoas) && data.pessoas.length
        ? data.pessoas
        : [{ nome: data.nome, cpf: data.cpf, contato: data.contato, email: data.email }];

      section("Dados Pessoais");
      pessoas.forEach((p, i) => {
        if (pessoas.length > 1) {
          doc.setFontSize(8);
          doc.setFont("helvetica", "bold");
          doc.setTextColor(...GRAY);
          doc.text((i === 0 ? "Hóspede principal" : `Acompanhante ${i}`).toUpperCase(), PAD, y);
          y += 7;
        }
        row("Nome",    p.nome);
        row("CPF/CNPJ", p.cpf);
        if (p.contato) row("Contato", p.contato);
        if (p.email)   row("E-mail",  p.email);
        if (i < pessoas.length - 1) y += 3;
      });
      y += 4;

      section("Estadia");
      row("Check-in",  this._fmtDate(data.checkin));
      row("Check-out", this._fmtDate(data.checkout));
      y += 4;

      // Cost breakdown
      const cost   = CostModel.compute(data);
      const fmtBRL = n => n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

      section("Serviços");
      row("Tipo de reserva",  data.tipoReserva || "Hóspede");
      row("Nº de pessoas",    String(data.numPessoas || 1));
      row("Modalidade",    data.modalidade);
      row("Roupa de cama", data.roupa ? "Sim (+R$5/pessoa)" : "Não");
      row("Pagamento",     data.pagamento);
      y += 4;

      section("Resumo do Custo");
      const numPessoas = Math.max(1, parseInt(data.numPessoas) || 1);
      const nightsLabel = numPessoas > 1
        ? `${cost.nights} diária${cost.nights > 1 ? "s" : ""} × ${fmtBRL(cost.ratePerNight)} × ${numPessoas} pessoas`
        : `${cost.nights} diária${cost.nights > 1 ? "s" : ""} × ${fmtBRL(cost.ratePerNight)}`;
      row(nightsLabel, fmtBRL(cost.accommodation));
      if (cost.linen) row("Roupa de cama", `${numPessoas}× R$5,00 = ${fmtBRL(cost.linen)}`);
      if (cost.discount > 0) {
        const dTipo  = data.descontoTipo;
        const dVal   = parseFloat(String(data.descontoValor || "0").replace(",", ".")) || 0;
        const dLabel = dTipo === "percent" ? `Desconto (${dVal}%)` : "Desconto";
        doc.setTextColor(56, 142, 60); // green for discount
        row(dLabel, `- ${fmtBRL(cost.discount)}`);
        doc.setTextColor(...BLACK); // reset
      }

      doc.setFillColor(255, 235, 238);
      doc.roundedRect(PAD - 2, y - 5, W - PAD * 2 + 4, 11, 2, 2, "F");
      doc.setFontSize(10);
      doc.setFont("helvetica", "bold");
      doc.setTextColor(...RED);
      doc.text("Total estimado:", PAD, y);
      doc.text(fmtBRL(cost.total), W - PAD, y, { align: "right" });
      y += 14;

      section("Observações");
      if (data.responsavel) row("Responsável", data.responsavel);
      if (data.obs) {
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(...BLACK);
        const lines = doc.splitTextToSize(data.obs, W - PAD * 2);
        lines.forEach(line => {
          guard(8);
          doc.text(line, PAD, y);
          y += 6;
        });
        y += 4;
      } else if (!data.responsavel) {
        row("", "Nenhuma observação.");
      }

      // ── Signature lines
      guard(30);
      y += 14;
      doc.setDrawColor(...GRAY);
      doc.setLineWidth(0.3);
      doc.line(PAD, y, PAD + 70, y);
      doc.line(W / 2 + 10, y, W - PAD, y);
      doc.setFontSize(9);
      doc.setFont("helvetica", "normal");
      doc.setTextColor(...GRAY);
      doc.text("Assinatura do Hóspede", PAD, y + 5);
      doc.text("Responsável pelo check-in", W / 2 + 10, y + 5);

      // ── Footer
      doc.setFontSize(8);
      doc.setTextColor(...GRAY);
      doc.text(
        `Gerado em ${new Date().toLocaleDateString("pt-BR")}`,
        W / 2, 285, { align: "center" }
      );

      // ── Filename: ficha-<nome-slug>-<checkin>.pdf
      const nGuests = Array.isArray(data.pessoas) ? data.pessoas.length : 1;
      const baseName = nGuests > 1 ? `grupo-${nGuests}pessoas` : (data.nome || "hospede");
      const slug = baseName
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "")
        .slice(0, 30);
      const dateSlug = data.checkin ? data.checkin : new Date().toISOString().slice(0, 10);
      doc.save(`ficha-${slug}-${dateSlug}.pdf`);
    },

    _fmtDate(iso) {
      if (!iso) return "—";
      const [y, m, d] = iso.split("-");
      return `${d}/${m}/${y}`;
    }
  };


  // ── App ──────────────────────────────────────────────────────────────
  // Responsibility: orchestrate the layers above.
  const _fmt    = n => n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  const _fmtDate = iso => { if (!iso) return "—"; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; };

  let _pendingData = null;

  const App = {
    // ── Step 1: validate → show confirmation modal
    salvar() {
      const data  = FormModel.read();
      const error = FormModel.validate(data);
      if (error) { Toast.show(error, true); return; }

      _pendingData = data;
      const cost    = CostModel.compute(data);
      const pessoas = data.pessoas || [{ nome: data.nome }];
      const nPessoas = pessoas.length;

      const lines = [];
      // List each person briefly
      pessoas.forEach((p, i) => {
        lines.push([ i === 0 ? "Hóspede principal" : `Acompanhante ${i}`, `${p.nome} · ${p.cpf}` ]);
      });
      lines.push(
        ["Tipo de reserva", `${data.tipoReserva} · ${nPessoas} pessoa${nPessoas > 1 ? "s" : ""}`],
        ["Check-in",        _fmtDate(data.checkin)],
        ["Check-out",       _fmtDate(data.checkout)],
        ["Noites",          String(cost.nights)],
        ["Modalidade",      data.modalidade],
        ["Roupa de cama",   data.roupa ? "Sim" : "Não"],
        ["Pagamento",       data.pagamento],
        ["Responsável",     data.responsavel],
      );
      if (cost.discount > 0) {
        const dVal = parseFloat(String(data.descontoValor||"0").replace(",",".")) || 0;
        lines.push(["Desconto", data.descontoTipo === "percent" ? `${dVal}% = -${_fmt(cost.discount)}` : `-${_fmt(cost.discount)}`]);
      }

      const html = lines.map(([k,v]) =>
        `<div class="review-line"><span>${k}</span><span>${v || "—"}</span></div>`
      ).join("") +
        `<div class="review-total"><span>Total estimado</span><span>${_fmt(cost.total)}</span></div>`;

      document.getElementById("modal-body").innerHTML = html;
      document.getElementById("modal-backdrop").classList.add("open");
    },

    cancelarModal() {
      document.getElementById("modal-backdrop").classList.remove("open");
      _pendingData = null;
    },

    // ── Step 2: confirmed → save
    async confirmarSalvar() {
      const data = _pendingData;
      if (!data) return;
      document.getElementById("modal-backdrop").classList.remove("open");

      const btn = document.getElementById("btn-salvar");
      btn.disabled = true;
      btn.textContent = "Registrando…";

      try {
        await FirebaseService.save(data);
      } catch (e) {
        console.error("[Firebase]", e);
        Toast.show(FirebaseService.friendlyError(e), true);
        btn.disabled = false;
        btn.textContent = "Registrar";
        return;
      }

      try {
        await EmailService.send(data);
        Toast.show("Hóspede registrado! Confirmação enviada por e-mail.");
      } catch (e) {
        console.error("[EmailJS]", e);
        Toast.show("Registrado, mas não foi possível enviar o e-mail de confirmação.", true);
      }

      _pendingData = null;
      FormModel.reset();
      btn.disabled = false;
      btn.textContent = "Registrar";
      setTimeout(() => Toast.show("Formulário limpo — pronto para o próximo registro."), 3200);
    },

    gerarPDF() {
      const data  = FormModel.read();
      const error = FormModel.validate(data);
      if (error) { Toast.show(error, true); return; }

      const btn = document.querySelector(".btn-secondary");
      btn.disabled = true;
      btn.textContent = "Gerando…";
      setTimeout(() => {
        try {
          PdfService.generate(data);
        } finally {
          btn.disabled = false;
          btn.textContent = "Gerar Ficha";
        }
      }, 50);
    },

    _syncCount() {
      const count = PessoaManager.container.querySelectorAll(".person-card").length;
      document.getElementById("num-pessoas").value = count;
      const badge = document.getElementById("pessoa-count-badge");
      if (count > 1) {
        badge.textContent = `${count} pessoas`;
        badge.style.display = "";
      } else {
        badge.style.display = "none";
      }
    },

    adicionarPessoa() {
      PessoaManager.add();
      this._syncCount();
      CostView.update(FormModel.read());
    },

    removerPessoa(btn) {
      PessoaManager.remove(btn);
      this._syncCount();
      CostView.update(FormModel.read());
    }
  };

  // Close modal when clicking outside
  document.getElementById("modal-backdrop").addEventListener("click", function(e) {
    if (e.target === this) App.cancelarModal();
  });

  // Expose to global scope for inline onclick handlers
  window.App = App;

  // Initialise dynamic person list
  PessoaManager.init();

</script>
</body>
</html>
